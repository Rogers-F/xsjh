name: Build xsjh image (GHCR)

# Builds the fused xsjh gateway image from this repo's Dockerfile (all three embedded
# frontends: Xingsuan Vue at the root plus both React console themes under /admin)
# and publishes it to GHCR as ghcr.io/<owner>/<repo> (i.e. ghcr.io/rogers-f/xsjh),
# the image the deploy server pulls for the Xingsuan main-site container.
# Single-arch amd64 to match the x86_64-only deployment.

on:
  workflow_dispatch: {}
  push:
    branches:
      - main

concurrency:
  group: xsjh-ghcr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute lowercase image name and tags
        id: img
        # Always tag the immutable :<sha> (the deploy server pins this). Additionally
        # move the convenience/fallback :latest tag only when building from main, so a
        # manual workflow_dispatch on a non-main ref can't promote a side build to :latest.
        run: |
          name="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "name=$name" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "$name:${GITHUB_SHA}"
            if [ "$GITHUB_REF" = "refs/heads/main" ]; then echo "$name:latest"; fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.img.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
